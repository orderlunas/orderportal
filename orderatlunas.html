<!DOCTYPE html>
<html>
<head>
  <title>Dessert Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }

    .header {
      background: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .floating-cart {
      position: fixed;
      top: 12px;
      right: 12px;
      background: #ff6b00;
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      display: none;
      z-index: 999;
      font-size: 14px;
    }

    .container {
      padding: 10px;
      padding-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .info {
      max-width: 65%;
    }

    .name {
      font-weight: 600;
      font-size: 15px;
    }

    .desc {
      font-size: 12px;
      color: gray;
    }

    .add-btn {
      border: 1px solid #ff6b00;
      color: #ff6b00;
      padding: 6px 14px;
      border-radius: 6px;
      font-weight: bold;
      background: white;
      cursor: pointer;
    }

    .counter {
      display: none;
      align-items: center;
      gap: 10px;
    }

    .counter button {
      width: 28px;
      height: 28px;
      border: none;
      background: #ff6b00;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .form-section {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button.submit {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #28a745;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button.submit:disabled {
      background: #ccc;
    }

  </style>
</head>

<body>

<div class="header">🍮 Dessert Menu</div>

<div class="floating-cart" id="cartBar">🛒 0</div>

<div class="container">

<form id="orderForm">

<!-- PRODUCTS -->

<div class="card">
  <div class="info">
    <div class="name">Mango Float Grande</div>
    <div class="desc">400ml</div>
  </div>

  <button type="button" class="add-btn" onclick="addItem('mango_grande', this)">ADD</button>

  <div class="counter" id="mango_grande_counter">
    <button type="button" onclick="changeQty('mango_grande', -1)">-</button>
    <span id="mango_grande_display">1</span>
    <button type="button" onclick="changeQty('mango_grande', 1)">+</button>
  </div>

  <input type="hidden" id="mango_grande" value="0">
</div>

<div class="card">
  <div class="info">
    <div class="name">Mango Float Mini</div>
    <div class="desc">250ml</div>
  </div>

  <button type="button" class="add-btn" onclick="addItem('mango_mini', this)">ADD</button>

  <div class="counter" id="mango_mini_counter">
    <button type="button" onclick="changeQty('mango_mini', -1)">-</button>
    <span id="mango_mini_display">1</span>
    <button type="button" onclick="changeQty('mango_mini', 1)">+</button>
  </div>

  <input type="hidden" id="mango_mini" value="0">
</div>

<div class="card">
  <div class="info">
    <div class="name">Coffee Crumble Grande</div>
    <div class="desc">400ml</div>
  </div>

  <button type="button" class="add-btn" onclick="addItem('coffee_grande', this)">ADD</button>

  <div class="counter" id="coffee_grande_counter">
    <button type="button" onclick="changeQty('coffee_grande', -1)">-</button>
    <span id="coffee_grande_display">1</span>
    <button type="button" onclick="changeQty('coffee_grande', 1)">+</button>
  </div>

  <input type="hidden" id="coffee_grande" value="0">
</div>

<div class="card">
  <div class="info">
    <div class="name">Coffee Crumble Mini</div>
    <div class="desc">250ml</div>
  </div>

  <button type="button" class="add-btn" onclick="addItem('coffee_mini', this)">ADD</button>

  <div class="counter" id="coffee_mini_counter">
    <button type="button" onclick="changeQty('coffee_mini', -1)">-</button>
    <span id="coffee_mini_display">1</span>
    <button type="button" onclick="changeQty('coffee_mini', 1)">+</button>
  </div>

  <input type="hidden" id="coffee_mini" value="0">
</div>

<div class="card">
  <div class="info">
    <div class="name">Coffee Jelly</div>
    <div class="desc">300ml</div>
  </div>

  <button type="button" class="add-btn" onclick="addItem('coffee_jelly', this)">ADD</button>

  <div class="counter" id="coffee_jelly_counter">
    <button type="button" onclick="changeQty('coffee_jelly', -1)">-</button>
    <span id="coffee_jelly_display">1</span>
    <button type="button" onclick="changeQty('coffee_jelly', 1)">+</button>
  </div>

  <input type="hidden" id="coffee_jelly" value="0">
</div>

<!-- CUSTOMER DETAILS -->

<div class="form-section">
  <h3>Customer Details</h3>

  <input type="text" id="name" placeholder="Full Name" required>

  <input type="tel" id="phone" placeholder="Phone Number" required>

  <textarea id="address" placeholder="Full Address" required></textarea>

  <select id="timeslot" required>
    <option value="">Select Time Slot</option>
    <option>11 AM - 1 PM</option>
    <option>3 PM - 5 PM</option>
    <option>7 PM - 9 PM</option>
  </select>

  <button type="submit" class="submit" id="submitBtn" disabled>Place Order</button>
</div>

</form>

</div>

<script>

const scriptURL = "PASTE_YOUR_WEB_APP_URL_HERE";

function addItem(id, btn) {
  document.getElementById(id).value = 1;
  document.getElementById(id + "_display").innerText = 1;

  document.getElementById(id + "_counter").style.display = "flex";
  btn.style.display = "none";

  updateCart();
}

function changeQty(id, delta) {
  let input = document.getElementById(id);
  let val = Math.max(0, Math.min(5, parseInt(input.value) + delta));

  input.value = val;
  document.getElementById(id + "_display").innerText = val;

  if (val === 0) {
    document.getElementById(id + "_counter").style.display = "none";
    document.querySelector(`[onclick="addItem('${id}', this)"]`).style.display = "block";
  }

  updateCart();
}

function updateCart() {
  const ids = ["mango_grande","mango_mini","coffee_grande","coffee_mini","coffee_jelly"];

  let total = ids.reduce((sum, id) =>
    sum + parseInt(document.getElementById(id).value), 0
  );

  const bar = document.getElementById("cartBar");

  if (total > 0) {
    bar.style.display = "block";
    bar.innerText = "🛒 " + total;
  } else {
    bar.style.display = "none";
  }

  document.getElementById("submitBtn").disabled = total === 0;
}

// phone restriction
document.getElementById("phone").addEventListener("input", function() {
  this.value = this.value.replace(/[^0-9]/g, "");
});

document.getElementById("orderForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const ids = ["mango_grande","mango_mini","coffee_grande","coffee_mini","coffee_jelly"];

  const products = ids.map(id => ({
    name: id,
    qty: +document.getElementById(id).value
  })).filter(p => p.qty > 0);

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      name: name.value,
      phone: phone.value,
      address: address.value,
      timeslot: timeslot.value,
      products
    })
  })
  .then(res => res.json())
  .then(res => {
    alert("Order placed! ID: " + res.orderID);
    location.reload();
  });
});

</script>

</body>
</html>
